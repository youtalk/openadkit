name: combine-multi-arch-images
description: Combine per-arch tags into a single multi-arch manifest per component
inputs:
  ros-distro:        { required: true,  description: "ROS distribution name (humble|jazzy)" }
  registry:          { required: true,  description: "Container registry host, e.g., ghcr.io" }
  image-prefix:      { required: true,  description: "Full image prefix, e.g., ghcr.io/<owner>/openadkit" }
  component-targets: { required: true,  description: "Whitespace-separated list of component target names" }
  date:              { required: false, default: "",  description: "Optional dated suffix (YYYYMMDD)" }
  version:           { required: false, default: "",  description: "Optional version suffix" }
  token:             { required: true,  description: "GitHub token with packages:write" }
runs:
  using: composite
  steps:
    - name: Log in to ${{ inputs.registry }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.token }}
    - name: Create multi-arch manifests
      shell: bash
      env:
        DISTRO:  ${{ inputs.ros-distro }}
        PREFIX:  ${{ inputs.image-prefix }}
        DATE:    ${{ inputs.date }}
        VERSION: ${{ inputs.version }}
        TARGETS: ${{ inputs.component-targets }}
      run: |
        set -euo pipefail
        suffixes=("")                       # always produce the unsuffixed rolling tag
        [ -n "$DATE" ]    && suffixes+=("$DATE")
        [ -n "$VERSION" ] && suffixes+=("$VERSION")
        for t in $TARGETS; do
          for s in "${suffixes[@]}"; do
            tag="${PREFIX}:${t}-${DISTRO}${s:+-$s}"
            amd64="${PREFIX}:${t}-amd64-${DISTRO}${s:+-$s}"
            arm64="${PREFIX}:${t}-arm64-${DISTRO}${s:+-$s}"
            srcs=()
            if docker manifest inspect "$amd64" >/dev/null 2>&1; then srcs+=("$amd64"); fi
            if docker manifest inspect "$arm64" >/dev/null 2>&1; then srcs+=("$arm64"); fi
            if [ ${#srcs[@]} -eq 0 ]; then
              echo "::warning::No per-arch tags found for $tag — skipping"
              continue
            fi
            echo "Creating $tag from: ${srcs[*]}"
            docker buildx imagetools create -t "$tag" "${srcs[@]}"
          done
        done
