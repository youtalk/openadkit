name: combine-multi-arch-images
description: Combine platform-specific Docker images into multi-arch manifests

inputs:
  ros-distro:
    description: ROS distribution (humble or jazzy)
    required: true
  registry:
    description: Container registry
    required: true
  image-prefix-common:
    description: Image prefix for common images
    required: true
  image-prefix-component:
    description: Image prefix for component images
    required: true
  token:
    description: GitHub token for API access
    required: true

runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.token }}

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq
      shell: bash

    - name: Combine multi-arch images for common packages
      run: |
        set -e

        # Function to get all tags for a package
        get_package_tags() {
          local package_name=$1
          local page=1
          local per_page=100
          local all_tags=()

          while true; do
            response=$(curl -s -H "Authorization: Bearer ${{ inputs.token }}" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${package_name}/versions?per_page=${per_page}&page=${page}")

            tags=$(echo "$response" | jq -r '.[].metadata.container.tags[]?' 2>/dev/null || echo "")

            if [ -z "$tags" ]; then
              break
            fi

            all_tags+=($tags)
            page=$((page + 1))
          done

          echo "${all_tags[@]}"
        }

        # Function to create multi-arch manifest
        create_manifest() {
          local image_name=$1
          local base_tag=$2

          echo "Creating multi-arch manifest for ${image_name}:${base_tag}"

          if docker buildx imagetools inspect "${image_name}:${base_tag}-amd64" >/dev/null 2>&1 && \
             docker buildx imagetools inspect "${image_name}:${base_tag}-arm64" >/dev/null 2>&1; then
            docker buildx imagetools create -t "${image_name}:${base_tag}" \
              "${image_name}:${base_tag}-amd64" \
              "${image_name}:${base_tag}-arm64"
            echo "✓ Created ${image_name}:${base_tag}"
          else
            echo "⚠ Skipping ${base_tag}: not all architectures available"
          fi
        }

        # Get package name from image prefix
        package_name=$(echo "${{ inputs.image-prefix-common }}" | sed 's|.*/||')

        echo "Fetching tags for package: ${package_name}"
        all_tags=$(get_package_tags "${package_name}")

        # Find base tags (without -amd64/-arm64 suffix)
        base_tags=$(echo "${all_tags}" | tr ' ' '\n' | grep -E '.*-amd64$' | sed 's/-amd64$//' | sort -u)

        # Create manifests for common images
        for base_tag in $base_tags; do
          # Only process tags for this ROS distro
          if echo "$base_tag" | grep -q "${{ inputs.ros-distro }}"; then
            create_manifest "${{ inputs.image-prefix-common }}" "$base_tag"
          fi
        done
      shell: bash

    - name: Combine multi-arch images for component packages
      run: |
        set -e

        # Function to get all tags for a package
        get_package_tags() {
          local package_name=$1
          local page=1
          local per_page=100
          local all_tags=()

          while true; do
            response=$(curl -s -H "Authorization: Bearer ${{ inputs.token }}" \
              "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${package_name}/versions?per_page=${per_page}&page=${page}")

            tags=$(echo "$response" | jq -r '.[].metadata.container.tags[]?' 2>/dev/null || echo "")

            if [ -z "$tags" ]; then
              break
            fi

            all_tags+=($tags)
            page=$((page + 1))
          done

          echo "${all_tags[@]}"
        }

        # Function to create multi-arch manifest
        create_manifest() {
          local image_name=$1
          local base_tag=$2

          echo "Creating multi-arch manifest for ${image_name}:${base_tag}"

          if docker buildx imagetools inspect "${image_name}:${base_tag}-amd64" >/dev/null 2>&1 && \
             docker buildx imagetools inspect "${image_name}:${base_tag}-arm64" >/dev/null 2>&1; then
            docker buildx imagetools create -t "${image_name}:${base_tag}" \
              "${image_name}:${base_tag}-amd64" \
              "${image_name}:${base_tag}-arm64"
            echo "✓ Created ${image_name}:${base_tag}"
          else
            echo "⚠ Skipping ${base_tag}: not all architectures available"
          fi
        }

        # Get package name from image prefix
        package_name=$(echo "${{ inputs.image-prefix-component }}" | sed 's|.*/||')

        echo "Fetching tags for package: ${package_name}"
        all_tags=$(get_package_tags "${package_name}")

        # Find base tags (without -amd64/-arm64 suffix)
        base_tags=$(echo "${all_tags}" | tr ' ' '\n' | grep -E '.*-amd64$' | sed 's/-amd64$//' | sort -u)

        # Create manifests for component images
        for base_tag in $base_tags; do
          # Only process tags for this ROS distro
          if echo "$base_tag" | grep -q "${{ inputs.ros-distro }}"; then
            create_manifest "${{ inputs.image-prefix-component }}" "$base_tag"
          fi
        done
      shell: bash
