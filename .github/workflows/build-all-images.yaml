name: build-all-images

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'extras/**'
      - 'scripts/build.sh'
      - 'scripts/probe_upstream_cuda_arm64.sh'
      - '.github/workflows/build-all-images.yaml'
      - '.github/actions/combine-multi-arch-images/**'
  pull_request:
    paths:
      - 'docker/**'
      - 'extras/**'
      - 'scripts/build.sh'
      - 'scripts/probe_upstream_cuda_arm64.sh'
      - '.github/workflows/build-all-images.yaml'
      - '.github/actions/combine-multi-arch-images/**'
  workflow_dispatch:

env:
  REGISTRY:     ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openadkit
  BAKE_FILE:    docker/bake.hcl

concurrency:
  group: build-all-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  date:
    runs-on: ubuntu-22.04
    outputs:
      date: ${{ steps.d.outputs.date }}
    steps:
      - id: d
        run: echo "date=$(date -u +'%Y%m%d')" >> "$GITHUB_OUTPUT"

  build-components:
    needs: [date]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        platform:  [linux/amd64, linux/arm64]
        ros-distro: [humble, jazzy]
        target:
          - sensing-perception
          - localization-mapping
          - planning-control
          - vehicle-system
          - api
          - visualizer
          - simulator
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          files: ${{ env.BAKE_FILE }}
          targets: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          set: |
            *.platform=${{ matrix.platform }}
            *.args.ROS_DISTRO=${{ matrix.ros-distro }}
            *.args.UPSTREAM_DEVEL=ghcr.io/autowarefoundation/autoware:universe-devel-${{ matrix.ros-distro }}
            *.args.UPSTREAM_RUN=ghcr.io/autowarefoundation/autoware:universe-${{ matrix.ros-distro }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}${{ github.event_name == 'pull_request' && format('-pr{0}', github.event.pull_request.number) || '' }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ needs.date.outputs.date }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || 'main' }},mode=max

  build-components-cuda:
    needs: [date]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        ros-distro: [humble, jazzy]
        target: [sensing-perception-cuda]
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v6
      - id: probe
        if: matrix.platform == 'linux/arm64'
        env:
          DISTRO: ${{ matrix.ros-distro }}
        run: |
          arm=$(./scripts/probe_upstream_cuda_arm64.sh "$DISTRO")
          echo "should_build=$arm" >> "$GITHUB_OUTPUT"
      - if: matrix.platform == 'linux/amd64' || steps.probe.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3
      - if: matrix.platform == 'linux/amd64' || steps.probe.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: matrix.platform == 'linux/amd64' || steps.probe.outputs.should_build == 'true'
        uses: docker/bake-action@v5
        with:
          files: ${{ env.BAKE_FILE }}
          targets: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          set: |
            *.platform=${{ matrix.platform }}
            *.args.ROS_DISTRO=${{ matrix.ros-distro }}
            *.args.UPSTREAM_DEVEL=ghcr.io/autowarefoundation/autoware:universe-devel-cuda-${{ matrix.ros-distro }}
            *.args.UPSTREAM_RUN=ghcr.io/autowarefoundation/autoware:universe-cuda-${{ matrix.ros-distro }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}${{ github.event_name == 'pull_request' && format('-pr{0}', github.event.pull_request.number) || '' }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ needs.date.outputs.date }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || 'main' }},mode=max
      - if: matrix.platform == 'linux/arm64' && steps.probe.outputs.should_build != 'true'
        run: echo "::warning::Skipping ${{ matrix.target }} on arm64; upstream universe-cuda-${{ matrix.ros-distro }} has no arm64 layer yet"

  build-universe:
    needs: [date, build-components, build-components-cuda]
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:  [linux/amd64, linux/arm64]
        ros-distro: [humble, jazzy]
        target: [universe]
        include:
          - platform: linux/amd64
            ros-distro: humble
            target: universe-cuda
          - platform: linux/amd64
            ros-distro: jazzy
            target: universe-cuda
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/free-disk-space
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          files: ${{ env.BAKE_FILE }}
          targets: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          set: |
            *.platform=${{ matrix.platform }}
            *.args.ROS_DISTRO=${{ matrix.ros-distro }}
            *.args.UPSTREAM_DEVEL=ghcr.io/autowarefoundation/autoware:universe-devel${{ contains(matrix.target, 'cuda') && '-cuda' || '' }}-${{ matrix.ros-distro }}
            *.args.UPSTREAM_RUN=ghcr.io/autowarefoundation/autoware:universe${{ contains(matrix.target, 'cuda') && '-cuda' || '' }}-${{ matrix.ros-distro }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}${{ github.event_name == 'pull_request' && format('-pr{0}', github.event.pull_request.number) || '' }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ needs.date.outputs.date }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/openadkit-buildcache:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ matrix.ros-distro }}-${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || 'main' }},mode=max

  create-manifests:
    if: github.event_name != 'pull_request'
    needs: [date, build-components, build-components-cuda, build-universe]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        ros-distro: [humble, jazzy]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/combine-multi-arch-images
        with:
          ros-distro:   ${{ matrix.ros-distro }}
          date:         ${{ needs.date.outputs.date }}
          registry:     ${{ env.REGISTRY }}
          image-prefix: ${{ env.IMAGE_PREFIX }}
          component-targets: >-
            sensing-perception
            sensing-perception-cuda
            localization-mapping
            planning-control
            vehicle-system
            api
            visualizer
            simulator
            universe
            universe-cuda
          token: ${{ secrets.GITHUB_TOKEN }}

  verify-multi-arch:
    if: github.event_name != 'pull_request'
    needs: [date, create-manifests]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        ros-distro: [humble, jazzy]
        target:
          - sensing-perception
          - localization-mapping
          - planning-control
          - vehicle-system
          - api
          - visualizer
          - simulator
          - universe
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert multi-arch manifest contains amd64 and arm64
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.ros-distro }}-${{ needs.date.outputs.date }}
        run: |
          out=$(docker buildx imagetools inspect "$IMAGE" --raw)
          echo "$out" | jq -e '.manifests[] | select(.platform.architecture=="amd64")' > /dev/null
          echo "$out" | jq -e '.manifests[] | select(.platform.architecture=="arm64")' > /dev/null
