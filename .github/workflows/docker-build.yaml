# Reusable workflow: builds and pushes ONE docker bake-group via
# `docker buildx bake`, for one ROS distro, on ONE platform. Callers run it
# twice (amd64 + arm64) to produce per-arch tags, then stitch them with
# docker-manifest.yaml.
#
# Two caches cooperate (see upstream autoware docker-build.yaml for the full
# rationale): a GHA mount cache (actions/cache) for the BuildKit RUN mounts,
# and a GHCR registry layer cache (cache-to=type=registry).

name: docker-build

on:
  workflow_call:
    inputs:
      bake-group:
        description: HCL group to build (e.g. ci-universe-common, ci-components)
        type: string
        required: true
      platform:
        description: Target platform (amd64 or arm64)
        type: string
        required: true
      ros-distro:
        description: ROS distribution
        type: string
        default: jazzy
      target-image:
        description: Registry image name
        type: string
        default: openadkit
      needs-source:
        description: Whether to clone the Autoware source tree via vcs import
        type: boolean
        default: false
      free-disk-space:
        description: Whether to free disk space before building
        type: boolean
        default: true
      ensure-upstream:
        description: Verify upstream Autoware images referenced by the bake-group exist on GHCR
        type: boolean
        default: false
      max-cache-size-gb:
        description: Max allowed size (GB) for restored BuildKit cache mounts
        type: number
        default: 6

jobs:
  build:
    name: ${{ inputs.bake-group }}
    runs-on: >-
      ${{ inputs.platform == 'amd64'
          && (github.actor == 'youtalk' && 'ubicloud-standard-16' || 'ubuntu-24.04')
          || (github.actor == 'youtalk' && 'ubicloud-standard-16-arm' || 'ubuntu-24.04-arm') }}
    permissions:
      contents: read
      packages: write
      actions: write
    env:
      CACHE_KEY_PREFIX: buildkit-mounts-${{ inputs.bake-group }}-${{ inputs.ros-distro }}-${{ inputs.platform }}-
      IS_MAIN_PUSH: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
      UPSTREAM_TAG: ${{ vars.UPSTREAM_TAG }}
    steps:
      - name: 🔧 Change permission of workspace
        run: sudo chown -R "$USER":"$USER" "${{ github.workspace }}"

      - name: 📥 Check out repository
        uses: actions/checkout@v6

      - name: 🧹 Free disk space
        if: inputs.free-disk-space && runner.environment == 'github-hosted'
        uses: ./.github/actions/free-disk-space

      - name: 📦 Import Autoware source
        if: inputs.needs-source
        run: |
          pipx install vcs2l
          git clone --depth 1 https://github.com/autowarefoundation/autoware.git autoware
          mkdir -p autoware/src
          vcs import --shallow autoware/src < autoware/repositories/autoware.repos

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 🔍 Ensure upstream images exist
        if: inputs.ensure-upstream
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
        run: |
          set -euo pipefail
          refs=$(docker buildx bake -f docker/docker-bake.hcl --print ${{ inputs.bake-group }} 2>/dev/null \
            | jq -r '[.target[].contexts // {} | to_entries[].value]
                     | map(select(startswith("docker-image://ghcr.io/autowarefoundation/autoware:")))
                     | unique[]' \
            | sed 's#^docker-image://##')
          if [ -z "${refs}" ]; then
            echo "No upstream Autoware images referenced by ${{ inputs.bake-group }}; nothing to verify."
            exit 0
          fi
          fail=0
          while IFS= read -r ref; do
            [ -z "${ref}" ] && continue
            echo "::group::inspect ${ref}"
            if docker buildx imagetools inspect "${ref}" >/dev/null 2>&1; then
              echo "OK: ${ref}"
            else
              echo "::error::Missing upstream image: ${ref}"
              fail=1
            fi
            echo "::endgroup::"
          done <<< "${refs}"
          [ "${fail}" -eq 0 ]

      - name: 🏷️ Compute target tags from HCL
        id: compute-tags
        run: |
          targets=$(docker buildx bake -f docker/docker-bake.hcl --print ${{ inputs.bake-group }} 2>/dev/null \
            | jq -r '.group."${{ inputs.bake-group }}".targets[]')
          tags=""
          for t in ${targets}; do
            tags="${tags:+${tags} }${t}-${{ inputs.ros-distro }}"
          done
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "::notice::Target tags: ${tags}"

      - name: 💾 Restore BuildKit cache mounts
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: cache-mounts
          key: ${{ env.CACHE_KEY_PREFIX }}${{ github.sha }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}

      - name: 💾 Arm post-step save of BuildKit cache mounts (main)
        if: env.IS_MAIN_PUSH == 'true'
        id: cache-save
        uses: actions/cache@v5
        with:
          path: cache-mounts
          key: ${{ env.CACHE_KEY_PREFIX }}${{ github.sha }}
          lookup-only: true

      - name: 💉 Inject BuildKit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          # apt-cache is cached for every group except the CUDA ones:
          # CUDA/cuDNN/TensorRT .debs alone exceed a reasonable tarball size.
          cache-map: |
            {
              ${{ !contains(fromJSON('["ci-components-cuda","ci-universe-cuda"]'), inputs.bake-group) && format('"cache-mounts/apt-cache": {{
                "id": "apt-cache-{0}",
                "target": "/var/cache/apt"
              }},', inputs.ros-distro) || '' }}
              "cache-mounts/apt-lists": {
                "id": "apt-lists-${{ inputs.ros-distro }}",
                "target": "/var/lib/apt/lists"
              },
              "cache-mounts/ccache": {
                "id": "ccache-${{ inputs.ros-distro }}",
                "target": "/home/aw/.ccache",
                "uid": "1000",
                "gid": "1000"
              },
              "cache-mounts/pip": {
                "id": "pip-cache",
                "target": "/home/aw/.cache/pip",
                "uid": "1000",
                "gid": "1000"
              },
              "cache-mounts/pipx": {
                "id": "pipx-cache",
                "target": "/home/aw/.cache/pipx",
                "uid": "1000",
                "gid": "1000"
              }
            }
          skip-extraction: ${{ steps.cache-restore.outputs.cache-hit }}

      - name: 📋 Prepare build metadata
        id: meta
        run: |
          ref_name="${GITHUB_REF_NAME//\//-}"
          echo "ref_name=${ref_name}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref_name }}" != "main" ]]; then
            echo "ref=${ref_name}" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔨 Build and push [${{ inputs.bake-group }}] (${{ inputs.platform }})
        id: bake
        uses: docker/bake-action@v7
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
          PLATFORM: ${{ inputs.platform }}
          TAG_DATE: ${{ steps.meta.outputs.date }}
          TAG_VERSION: ${{ steps.meta.outputs.version }}
          TAG_REF: ${{ steps.meta.outputs.ref }}
          UPSTREAM_TAG: ${{ vars.UPSTREAM_TAG }}
          USE_REGISTRY_CONTEXTS: ${{ inputs.bake-group != 'ci-universe-common' }}
          BUILDX_METADATA_PROVENANCE: disabled
        with:
          source: .
          push: true
          targets: ${{ inputs.bake-group }}
          files: docker/docker-bake.hcl
          provenance: false
          set: |
            *.platform=linux/${{ inputs.platform }}
            *.args.ROS_DISTRO=${{ inputs.ros-distro }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache:${{ inputs.bake-group }}-${{ inputs.ros-distro }}-${{ inputs.platform }}-${{ steps.meta.outputs.ref_name }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache:${{ inputs.bake-group }}-${{ inputs.ros-distro }}-${{ inputs.platform }}-main
            *.cache-to=type=registry,ref=ghcr.io/${{ github.repository }}-buildcache:${{ inputs.bake-group }}-${{ inputs.ros-distro }}-${{ inputs.platform }}-${{ steps.meta.outputs.ref_name }},mode=max,ignore-error=true

      - name: 🧹 Prune cache lineage
        if: env.IS_MAIN_PUSH == 'true' && steps.bake.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_KEY: ${{ env.CACHE_KEY_PREFIX }}${{ github.sha }}
          MAX_GB: ${{ inputs.max-cache-size-gb }}
        run: |
          set -euo pipefail
          max_bytes=$((MAX_GB * 1000 * 1000 * 1000))
          echo "keep: ${KEEP_KEY} (written in post phase)"
          gh cache list --repo "$GITHUB_REPOSITORY" --key "$CACHE_KEY_PREFIX" --limit 100 --json key,sizeInBytes \
            | jq -r --arg keep "$KEEP_KEY" --argjson max "$max_bytes" \
                '.[] | select(.key != $keep or .sizeInBytes > $max) | .key' \
            | while read -r key; do
                echo "delete: $key"
                gh cache delete "$key" --repo "$GITHUB_REPOSITORY" || true
              done
