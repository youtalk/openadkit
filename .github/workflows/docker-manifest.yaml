# Stitches the per-arch tags pushed by docker-build.yaml into multi-arch
# manifests. Runs once per ROS distro after both the amd64 and arm64
# pipelines finish. Targets are discovered from the `default` group in
# docker/docker-bake.hcl.
#
# openadkit specifics vs upstream:
#   - CUDA targets (*-cuda) are amd64-only, so they are stitched from the
#     amd64 per-arch tag alone.
#   - default-distro-alias=true (jazzy only) additionally publishes
#     no-distro-suffix alias tags so `openadkit:<name>` keeps resolving.

name: docker-manifest

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS distribution
        type: string
        required: true
      target-image:
        description: Registry image name
        type: string
        default: openadkit
      default-distro-alias:
        description: Also publish no-distro-suffix alias tags from these per-arch tags
        type: boolean
        default: false

jobs:
  manifest:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.target-image }}
      ROS_DISTRO: ${{ inputs.ros-distro }}
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v6

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: 🧭 Discover manifest targets
        id: targets
        run: |
          set -euo pipefail
          targets=$(docker buildx bake -f docker/docker-bake.hcl --print default 2>/dev/null \
            | jq -r '.target | keys[] | select(startswith("_") | not)')
          if [ -z "${targets}" ]; then
            echo "::error::No targets found in default group of docker/docker-bake.hcl"
            exit 1
          fi
          echo "Found $(echo "${targets}" | wc -l) target(s)"
          {
            echo "list<<EOF"
            echo "${targets}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🏷️ Build suffix list
        id: suffixes
        run: |
          set -euo pipefail
          date=$(date +'%Y%m%d')
          ref=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.ref_name }}" != "main" ]]; then
            ref="${GITHUB_REF_NAME//\//-}"
          fi
          # Mirror tags() in docker/docker-bake.hcl.
          suffixes=()
          if [ -z "${ref}" ]; then
            suffixes+=("")
            [ -n "${date}" ] && suffixes+=("-${date}")
          else
            suffixes+=("-${ref}")
          fi
          [ -n "${VERSION}" ] && suffixes+=("-${VERSION}")
          printf '%s\n' "${suffixes[@]}" > /tmp/suffixes.txt
          echo "date=${date}" >> "$GITHUB_OUTPUT"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: 🔗 Create multi-arch manifests
        env:
          TARGETS: ${{ steps.targets.outputs.list }}
        run: |
          set -euo pipefail
          mapfile -t suffixes < /tmp/suffixes.txt

          create_manifest() {
            # $1 = manifest tag, $2 = amd64 source tag, $3 = arm64 source tag ("" = single-arch)
            local tag="$1" amd64="$2" arm64="$3"
            echo "::group::📦 ${tag}"
            if [ -n "${arm64}" ]; then
              docker manifest create "${IMAGE}:${tag}" "${IMAGE}:${amd64}" "${IMAGE}:${arm64}"
            else
              docker manifest create "${IMAGE}:${tag}" "${IMAGE}:${amd64}"
            fi
            docker manifest push "${IMAGE}:${tag}"
            echo "::endgroup::"
          }

          while IFS= read -r target; do
            [ -z "${target}" ] && continue
            is_cuda=""
            [[ "${target}" == *cuda* ]] && is_cuda=1
            for suffix in "${suffixes[@]}"; do
              base="${target}-${ROS_DISTRO}${suffix}"
              if [ -n "${is_cuda}" ]; then
                create_manifest "${base}" "${base}-amd64" ""
              else
                create_manifest "${base}" "${base}-amd64" "${base}-arm64"
              fi
            done
          done <<< "${TARGETS}"

      - name: 🔗 Publish no-distro-suffix alias manifests
        if: inputs.default-distro-alias
        env:
          TARGETS: ${{ steps.targets.outputs.list }}
          DATE: ${{ steps.suffixes.outputs.date }}
          REF: ${{ steps.suffixes.outputs.ref }}
        run: |
          set -euo pipefail
          # Alias tags are only published for plain main pushes (no ref override).
          if [ -n "${REF}" ]; then
            echo "Skipping alias publish for ref build."
            exit 0
          fi
          alias_suffixes=("")
          [ -n "${DATE}" ] && alias_suffixes+=("-${DATE}")

          while IFS= read -r target; do
            [ -z "${target}" ] && continue
            is_cuda=""
            [[ "${target}" == *cuda* ]] && is_cuda=1
            for suffix in "${alias_suffixes[@]}"; do
              alias_tag="${target}${suffix}"
              src="${target}-${ROS_DISTRO}${suffix}"
              echo "::group::📦 alias ${alias_tag}"
              if [ -n "${is_cuda}" ]; then
                docker manifest create "${IMAGE}:${alias_tag}" "${IMAGE}:${src}-amd64"
              else
                docker manifest create "${IMAGE}:${alias_tag}" "${IMAGE}:${src}-amd64" "${IMAGE}:${src}-arm64"
              fi
              docker manifest push "${IMAGE}:${alias_tag}"
              echo "::endgroup::"
            done
          done <<< "${TARGETS}"
