name: release-all-images

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream tag suffix to pin, e.g., universe-jazzy-1.8.0"
        required: true
  repository_dispatch:
    types: [upstream-tag-detected]

env:
  REGISTRY:     ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openadkit
  BAKE_FILE:    docker/bake.hcl

concurrency:
  group: release-all-images-${{ github.event.client_payload.upstream_tag || inputs.upstream_tag }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-22.04
    outputs:
      upstream_tag: ${{ steps.r.outputs.tag }}
      version:      ${{ steps.r.outputs.version }}
      ros_distro:   ${{ steps.r.outputs.ros_distro }}
      flavor:       ${{ steps.r.outputs.flavor }}
    steps:
      - id: r
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.upstream_tag }}
          INPUT_TAG:    ${{ inputs.upstream_tag }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$DISPATCH_TAG}"
          [ -n "$tag" ] || { echo "no upstream_tag provided" >&2; exit 1; }
          # Accept universe-<distro>-<version> or universe-cuda-<distro>-<version>
          ros_distro=$(echo "$tag" | sed -E 's/^universe(-cuda)?-(humble|jazzy)-.*/\2/')
          version=$(echo    "$tag" | sed -E 's/^universe(-cuda)?-(humble|jazzy)-//')
          if echo "$tag" | grep -qE '^universe-cuda-'; then
            flavor="cuda"
          else
            flavor="std"
          fi
          [ -n "$ros_distro" ] && [ -n "$version" ] || { echo "could not parse $tag" >&2; exit 1; }
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "ros_distro=$ros_distro"
            echo "flavor=$flavor"
          } >> "$GITHUB_OUTPUT"

  build-components:
    needs: resolve
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        target:
          - sensing-perception
          - localization-mapping
          - planning-control
          - vehicle-system
          - api
          - visualizer
          - simulator
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          files: ${{ env.BAKE_FILE }}
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.platform=${{ matrix.platform }}
            *.args.ROS_DISTRO=${{ needs.resolve.outputs.ros_distro }}
            *.args.UPSTREAM_DEVEL=ghcr.io/autowarefoundation/autoware:universe-devel-${{ needs.resolve.outputs.ros_distro }}-${{ needs.resolve.outputs.version }}
            *.args.UPSTREAM_RUN=ghcr.io/autowarefoundation/autoware:universe-${{ needs.resolve.outputs.ros_distro }}-${{ needs.resolve.outputs.version }}
            *.tags=${{ env.IMAGE_PREFIX }}:${{ matrix.target }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}-${{ needs.resolve.outputs.ros_distro }}-${{ needs.resolve.outputs.version }}

  create-manifests:
    needs: [resolve, build-components]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/combine-multi-arch-images
        with:
          ros-distro:   ${{ needs.resolve.outputs.ros_distro }}
          version:      ${{ needs.resolve.outputs.version }}
          registry:     ${{ env.REGISTRY }}
          image-prefix: ${{ env.IMAGE_PREFIX }}
          component-targets: >-
            sensing-perception
            localization-mapping
            planning-control
            vehicle-system
            api
            visualizer
            simulator
          token: ${{ secrets.GITHUB_TOKEN }}
